{% extends "portal/base.html" %}
{% block title %}PanelLock Sign In - Green Pipe Partners{% endblock %}
{% block content %}
<section class="account-shell">
    <div class="account-card">
        <p class="eyebrow">PanelLock customer portal</p>
        <h1>Sign in</h1>
        <p>Customer accounts are invitation-only.</p>
        <form method="post" class="stack-form">
            {% csrf_token %}
            {{ form.as_p }}
            {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
            <button class="button primary" type="submit">Sign in</button>
        </form>
        <p><a class="text-link" href="{% url 'organizations:password_reset' %}">Forgot your password?</a></p>
    </div>
</section>
{% endblock %}
