{% load static %}
<section class="oc-demo-section" aria-labelledby="agentlabs-story-heading">

        <div class="oc-terminal">
            <div class="oc-terminal__bar" aria-hidden="true"><span class="oc-terminal__title">opencode@agentlab: fluxolot-vm-lab</span></div>
            <div class="oc-terminal__screen" aria-live="polite">

                    <div class="oc-terminal__story-body oc-landing-body">

                    </div>
                    <span class="oc-story-path">~/agentlabs/fluxolot-vm-lab/</span><span class="oc-story-version">1.0.0</span>
                </section>
                <section class="oc-terminal__story" data-story-panel aria-hidden="true" hidden>
                    <div class="oc-terminal__story-body">
                        <div class="oc-message oc-user-message">Replicate the base VM and load up a new VM lab with our Fluxolot Ignition project containerized, and build the Ignition database with it.</div>
                        <div class="oc-message oc-assistant-message" data-model-typewriter><p>I'm on it. I'll verify the approved base image, create an isolated VM clone, build the pinned Ignition and database containers, restore Fluxolot, and validate the finished lab.</p><p>I'll preserve the base VM and report each result as I work.</p></div>
                        <div class="oc-run"><span class="oc-run__square"></span><strong>Build</strong> · agentlab</div>
                    </div>
                    <div class="oc-composer"><div class="oc-composer__input"></div><div class="oc-composer__meta"><strong>Build</strong> · agentlab · fluxolot-lab</div></div>
                    <span class="oc-story-path">~/agentlabs/fluxolot-vm-lab/</span><span class="oc-story-version">1.0.0</span>
                </section>
                <section class="oc-terminal__story" data-story-panel aria-hidden="true" hidden>
                    <div class="oc-terminal__story-body">
                        <div class="oc-run"><span class="oc-run__square"></span><strong>Build</strong> · agentlab</div>
                        <div class="oc-message oc-user-message">Replicate the base VM and load up a new VM lab with our Fluxolot Ignition project containerized, and build the Ignition database with it.</div>
                        <div class="oc-thought" data-model-typewriter>I need to keep the source image immutable, verify capacity and checksums, create an isolated clone, pin the container versions, restore only approved Fluxolot artifacts, initialize the database, and finish with reproducible health checks.</div>
                    </div>
                    <div class="oc-composer"><div class="oc-composer__input"></div><div class="oc-composer__meta"><strong>Build</strong> · agentlab · fluxolot-lab</div></div>
                    <span class="oc-story-path">~/agentlabs/fluxolot-vm-lab/</span><span class="oc-story-version">1.0.0</span>
                </section>
                <section class="oc-terminal__story" data-story-panel aria-hidden="true" hidden>
                    <div class="oc-terminal__story-body">
                        <pre class="oc-code oc-code--diff" data-model-typewriter><span class="oc-code__add">+ name: fluxolot-vm-lab-01</span>
<span class="oc-code__add">+ base_image: gpp-base-ubuntu-24.04</span>
<span class="oc-code__add">+ network: isolated-controls-lab</span>
<span class="oc-code__add">+ services:</span>
<span class="oc-code__add">+   ignition:</span>
<span class="oc-code__add">+     image: inductiveautomation/ignition:8.3.8</span>
<span class="oc-code__add">+     restore: ./artifacts/fluxolot.gwbk</span>
<span class="oc-code__add">+   database:</span>
<span class="oc-code__add">+     image: postgres:17</span>
<span class="oc-code__add">+     migrations: ./database/migrations</span>
<span class="oc-code__add">+ verify: [gateway, database, tags, history]</span></pre>
                        <div class="oc-run"><span class="oc-run__square"></span><strong>Wrote</strong> · lab/fluxolot/compose.yaml · +12</div>
                    </div>
                    <div class="oc-composer"><div class="oc-composer__input"></div><div class="oc-composer__meta"><strong>Build</strong> · agentlab · fluxolot-lab</div></div>
                    <span class="oc-story-path">~/agentlabs/fluxolot-vm-lab/</span><span class="oc-story-version">1.0.0</span>
                </section>
                <section class="oc-terminal__story" data-story-panel aria-hidden="true" hidden>
                    <div class="oc-terminal__story-body">
                        <pre class="oc-log" data-model-typewriter>agentlab.vm [INFO] base checksum verified: gpp-base-ubuntu-24.04
agentlab.vm [INFO] cloned fluxolot-vm-lab-01; source remains read-only

agentlab.verify [INFO] checking gateway, database, tags, and history...</pre>

                    </div>
                    <div class="oc-composer"><div class="oc-composer__input"></div><div class="oc-composer__meta"><strong>Build</strong> · agentlab · fluxolot-lab</div></div>
                    <span class="oc-story-path">~/agentlabs/fluxolot-vm-lab/</span><span class="oc-story-version">1.0.0</span>
                </section>
                <section class="oc-terminal__story" data-story-panel aria-hidden="true" hidden>
                    <div class="oc-terminal__story-body">
                        <div class="oc-success" data-model-typewriter><p><span class="oc-success__pass">PASS.</span> Fluxolot VM lab is ready.</p><p>Ignition and PostgreSQL are healthy. The project restore, migrations, tags, and history checks pass.</p><p>Build record: <span class="oc-path">agentlab://fluxolot-vm-lab-01/builds/001</span></p></div>
                        <div class="oc-thought" data-model-typewriter data-reveal-on-type>Prepared for staff review and repeatable rebuild.</div>
                        <pre class="oc-log" data-model-typewriter data-reveal-on-type>CREATED fluxolot-vm-lab-01
BASE VM UNCHANGED
STATUS ready-for-review</pre>

            <span class="oc-terminal__caption" data-story-caption aria-hidden="false"><strong>prompt in OpenCode:</strong> ask for the desired controls lab in plain language.</span>
