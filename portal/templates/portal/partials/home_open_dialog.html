{% load static %}
<figure class="oc-story-player oc-story-player--home" aria-label="Green Pipe Partners open manufacturing dialogue" data-prompt-story data-story-durations="6500,15000,13000,15000,13000">
    <div class="oc-terminal">
        <div class="oc-terminal__bar" aria-hidden="true"><span class="oc-terminal__title">opencode@agentlab: open-manufacturing</span></div>
        <div class="oc-terminal__screen" aria-live="polite">
            <section class="oc-terminal__story" data-story-panel aria-hidden="false">
                <div class="oc-terminal__story-body oc-landing-body">
                    <div class="oc-landing-workspace"><div class="oc-landing"><img class="oc-landing__logo" src="{% static 'portal/opencode-wordmark-dark.svg' %}" alt="OpenCode" width="641" height="115" loading="lazy" decoding="async" draggable="false"><div class="oc-composer oc-landing-prompt"><div class="oc-composer__input"><span data-typewriter data-text="We need to harden the plant and keep operations in control of their equipment. How can we do this?"></span></div><div class="oc-composer__meta"><strong>Build</strong> · agentlab · greenpipe</div></div></div></div>
                </div>
                <span class="oc-story-path">~/greenpipe/open-manufacturing/</span><span class="oc-story-version">1.0.0</span>
            </section>
            <section class="oc-terminal__story" data-story-panel aria-hidden="true" hidden>
                <div class="oc-terminal__story-body">
                    <div class="oc-message oc-user-message">We need to harden the plant and keep operations in control of their equipment. How can we do this?</div>
                    <div class="oc-message oc-assistant-message" data-model-typewriter><p>Give operations two things: an environment they can own and a process they control.</p><p>AgentLab provides the configured engineering workbench. PanelLock carries that same workbench into panel modernization. Agents build repeatable plans, authorized staff approve them, and operations retains stop/go and cutover authority.</p></div>
                    <div class="oc-run"><span class="oc-run__square"></span><strong>Build</strong> · agentlab</div>
                </div>
                <div class="oc-composer"><div class="oc-composer__input"><span data-typewriter data-text="OK, but controls people all really want to know what's actually going on in their plant. They despise black boxes. How can we solve this?"></span></div><div class="oc-composer__meta"><strong>Build</strong> · agentlab · greenpipe</div></div>
                <span class="oc-story-path">~/greenpipe/open-manufacturing/</span><span class="oc-story-version">1.0.0</span>
            </section>
            <section class="oc-terminal__story" data-story-panel aria-hidden="true" hidden>
                <div class="oc-terminal__story-body">
                    <div class="oc-message oc-user-message">OK, but controls people all really want to know what's actually going on in their plant. They despise black boxes. How can we solve this?</div>
                    <div class="oc-message oc-assistant-message" data-model-typewriter><p>Make openness the operating model, not just a licensing choice.</p><p>Build on Flux. Keep the source code, configuration, interfaces, and change history inspectable. Return logs and evidence to the people operating the plant. When engineers can examine the system, they can understand it, challenge it, and improve it.</p></div>
                    <div class="oc-run"><span class="oc-run__square"></span><strong>Build</strong> · agentlab</div>
                </div>
                <div class="oc-composer"><div class="oc-composer__input"><span data-typewriter data-text="But can we make this secure?"></span></div><div class="oc-composer__meta"><strong>Build</strong> · agentlab · greenpipe</div></div>
                <span class="oc-story-path">~/greenpipe/open-manufacturing/</span><span class="oc-story-version">1.0.0</span>
            </section>
            <section class="oc-terminal__story" data-story-panel aria-hidden="true" hidden>
                <div class="oc-terminal__story-body">
                    <div class="oc-message oc-user-message">But can we make this secure?</div>
                    <div class="oc-message oc-assistant-message" data-model-typewriter><p>Yes. Open platforms can be more secure than proprietary platforms because their code, dependencies, build inputs, configurations, and controls can be independently audited instead of hidden behind vendor claims.</p><p>No platform is immune from attack. The advantage is that open security can be inspected and verified. Pair that visibility with reproducible builds, signed artifacts, least privilege, protected backups, allowlisted operations, human authorization, and independent review.</p><p>Proprietary systems ask you to trust the security claim. Open systems let you verify it.</p></div>
                    <div class="oc-run"><span class="oc-run__square"></span><strong>Build</strong> · agentlab</div>
                </div>
                <div class="oc-composer"><div class="oc-composer__input"></div><div class="oc-composer__meta"><strong>Build</strong> · agentlab · greenpipe</div></div>
                <span class="oc-story-path">~/greenpipe/open-manufacturing/</span><span class="oc-story-version">1.0.0</span>
            </section>
            <section class="oc-terminal__story" data-story-panel aria-hidden="true" hidden>
                <div class="oc-terminal__story-body">
                    <div class="oc-run"><span class="oc-run__square"></span><strong>Build</strong> · open-manufacturing</div>
                    <div class="oc-message oc-assistant-message" data-model-typewriter><p>That gives us one operating model:</p><p><a class="oc-path oc-path-link" href="{% url 'portal:agentlabs' %}">AgentLab</a> builds capability in an environment controls teams can own.</p><p><a class="oc-path oc-path-link" href="{% url 'panellock:index' %}">PanelLock</a> applies authorized work without surrendering operational control.</p><p><a class="oc-path oc-path-link" href="https://github.com/GreenPipePartners/Flux">Flux</a> keeps the software foundation open, inspectable, and adaptable.</p><p>Open by default. Controlled in operation. Owned by the people who run the plant.</p></div>
                    <div class="oc-run"><span class="oc-run__square"></span><strong>Build</strong> · complete</div>
                </div>
                <div class="oc-composer"><div class="oc-composer__input"></div><div class="oc-composer__meta"><strong>Build</strong> · agentlab · greenpipe</div></div>
                <span class="oc-story-path">~/greenpipe/open-manufacturing/</span><span class="oc-story-version">1.0.0</span>
            </section>
        </div>
    </div>
    <figcaption class="oc-terminal__captions" aria-live="polite">
        <span class="oc-terminal__caption" data-story-caption aria-hidden="false"><strong>the operating question:</strong> harden the plant without taking authority away from operations.</span>
        <span class="oc-terminal__caption" data-story-caption aria-hidden="true" hidden><strong>control begins with ownership:</strong> use one inspectable AgentLab and keep people at every authorization boundary.</span>
        <span class="oc-terminal__caption" data-story-caption aria-hidden="true" hidden><strong>visibility comes from openness:</strong> source, configuration, interfaces, logs, and evidence stay inspectable.</span>
        <span class="oc-terminal__caption" data-story-caption aria-hidden="true" hidden><strong>security becomes verifiable:</strong> audit the platform and combine visibility with disciplined technical controls.</span>
        <span class="oc-terminal__caption" data-story-caption aria-hidden="true" hidden><strong>the Green Pipe model:</strong> AgentLab builds capability, PanelLock controls application, and Flux keeps the foundation open.</span>
    </figcaption>
    <div class="oc-terminal__controls" role="group" aria-label="Open manufacturing dialogue playback controls"><div class="oc-terminal__controls-group"><div class="oc-terminal__stories" aria-label="Open manufacturing dialogue progress">
        <button class="oc-terminal__story-trigger" type="button" data-story-trigger aria-label="Show plant hardening prompt"><span>Harden</span></button><button class="oc-terminal__story-trigger" type="button" data-story-trigger aria-label="Show operational control response"><span>Control</span></button><button class="oc-terminal__story-trigger" type="button" data-story-trigger aria-label="Show open visibility response"><span>Visibility</span></button><button class="oc-terminal__story-trigger" type="button" data-story-trigger aria-label="Show open security response"><span>Security</span></button><button class="oc-terminal__story-trigger" type="button" data-story-trigger aria-label="Show Green Pipe operating model"><span>Model</span></button>
    </div><button class="oc-terminal__playback" type="button" data-story-playback aria-label="Play story playback" aria-pressed="false"><span class="oc-terminal__replay" aria-hidden="true">&#8634; <span>play again</span></span></button></div></div>
