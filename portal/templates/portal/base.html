{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Green Pipe Partners{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Flux: the Green Pipe controls workbench for SCADA teams.{% endblock %}">
    <meta property="og:site_name" content="Green Pipe Partners">
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% block og_title %}Green Pipe Partners{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Flux: the Green Pipe controls workbench for SCADA teams.{% endblock %}">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{% block twitter_title %}Green Pipe Partners{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}Flux: the Green Pipe controls workbench for SCADA teams.{% endblock %}">
    <script>
        (() => {
            let savedTheme = null;
            try {
                savedTheme = localStorage.getItem("greenpipe-theme");
            } catch {
                savedTheme = null;
            }
            const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            document.documentElement.dataset.theme = savedTheme || (prefersDark ? "dark" : "light");
        })();
    </script>
    <link rel="icon" href="{% static 'portal/favicon.ico' %}" sizes="any">
    <link rel="stylesheet" href="https://unpkg.com/@highlightjs/cdn-assets@11.11.1/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="{% static 'portal/styles.css' %}">
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
    <script src="https://unpkg.com/@highlightjs/cdn-assets@11.11.1/highlight.min.js" defer></script>
    <script src="{% static 'portal/site.js' %}" defer></script>
</head>
<body>
    <header class="site-header">
        <nav class="nav" aria-label="Primary navigation">
            <a class="brand" href="{% url 'portal:home' %}" aria-label="Green Pipe Partners home">
                <img class="brand-logo" src="{% url 'portal:logo' %}" alt="" width="48" height="48">
                <span>Green Pipe Partners</span>
            </a>
            <div class="nav-links">
                <a class="nav-link" href="https://github.com/GreenPipePartners/Flux">GitHub</a>
                <a class="nav-link" href="{% url 'portal:agentlab' %}">AgentLab</a>
                <a class="nav-link" href="{% url 'portal:fluxy' %}">Fluxy</a>
                <a class="nav-link" href="{% url 'portal:release_index' %}">Releases</a>
                <a class="nav-link" href="{% url 'portal:flux_docs_latest' %}">Docs</a>
                <a class="nav-link" href="{% url 'portal:about' %}">About</a>
                <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch to dark mode" aria-pressed="false">
                    <span data-theme-toggle-label>🌙</span>
                </button>
            </div>
        </nav>
        {% block hero %}{% endblock %}
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer" id="contact">
        <p>&copy; {% now "Y" %} Green Pipe Partners.</p>
    </footer>
</body>
</html>
