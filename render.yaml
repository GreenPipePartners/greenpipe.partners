databases:
  - name: greenpipe-partners-db
    databaseName: greenpipe
    user: greenpipe
    plan: starter

services:
  - type: web
    name: greenpipe-partners
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    autoDeploy: true
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: greenpipe.partners,www.greenpipe.partners,.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://greenpipe.partners,https://www.greenpipe.partners
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@greenpipe.partners
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: greenpipe-partners-db
          property: connectionString
