{% extends "portal/base.html" %}
{% block title %}Choose a New Password{% endblock %}
{% block content %}<section class="account-shell"><div class="account-card"><h1>Choose a new password</h1>{% if validlink %}<form method="post" class="stack-form">{% csrf_token %}{{ form.as_p }}<button class="button primary" type="submit">Change password</button></form>{% else %}<p>This password reset link is invalid or expired.</p>{% endif %}</div></section>{% endblock %}
